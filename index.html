<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; cursor: pointer; user-select: none; }

    /* Giao diện bảng: Màu nền xen kẽ, highlight hover */
    tbody tr:nth-child(even) { background-color: #f9f9f9; }
    tbody tr:hover { background-color: #f1f1f1; }

    .form-group { margin-bottom: 10px; }
    label { display: inline-block; width: 100px; }
    input { padding: 5px; width: 200px; }
    button { padding: 8px 15px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>Thêm Sản Phẩm</h2>
  <div class="form-group">
    <label for="input-name">Tên:</label>
    <input type="text" id="input-name">
  </div>
  <div class="form-group">
    <label for="input-category">Danh mục:</label>
    <input type="text" id="input-category">
  </div>
  <div class="form-group">
    <label for="input-price">Đơn giá:</label>
    <input type="number" id="input-price" step="any">
  </div>
  <div class="form-group">
    <label for="input-quantity">Số lượng:</label>
    <input type="number" id="input-quantity">
  </div>
  <button id="btn-add">Thêm</button>

  <h2>Danh Sách Sản Phẩm</h2>
  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="sort-by-name">Tên sản phẩm <span id="sort-icon"></span></th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody id="product-tbody">
      <!-- Dữ liệu được tải bằng AJAX -->
    </tbody>
  </table>

  <script>
    let products = [];
    let tang_dan = null;

    function loadProducts() {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', 'products.json', true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          products = JSON.parse(xhr.responseText);
          renderTable();
        }
      };
      xhr.send();
    }

    function renderTable() {
      const tbody = document.getElementById("product-tbody");
      tbody.innerHTML = '';
      products.forEach((p, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${p.name}</td>
          <td>${p.category || ''}</td>
          <td>${p.price}</td>
          <td>${p.quantity}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("sort-by-name").addEventListener('click', function() {
      if (tang_dan === null) {
        tang_dan = true;
      } else {
        tang_dan = !tang_dan;
      }

      document.getElementById('sort-icon').textContent = tang_dan ? "▲" : "▼";

      products.sort((a, b) => {
        const nameA = a.name.toLowerCase();
        const nameB = b.name.toLowerCase();
        if (nameA < nameB) return tang_dan ? -1 : 1;
        if (nameA > nameB) return tang_dan ? 1 : -1;
        return 0;
      });

      renderTable();
    });

    document.getElementById("btn-add").addEventListener('click', function() {
      const nameInput = document.getElementById('input-name');
      const categoryInput = document.getElementById('input-category');
      const priceInput = document.getElementById('input-price');
      const quantityInput = document.getElementById('input-quantity');

      const name = nameInput.value.trim();
      const category = categoryInput.value.trim();
      const price = parseFloat(priceInput.value);
      const quantity = parseFloat(quantityInput.value);

      if (name.length < 3) {
        alert('Tên sản phẩm không được rỗng và phải có ít nhất 3 ký tự.');
        return;
      }
      if (isNaN(price) || price <= 0) {
        alert('Đơn giá phải là số dương.');
        return;
      }
      if (isNaN(quantity) || quantity < 1 || !Number.isInteger(quantity)) {
        alert('Số lượng phải là số nguyên ≥ 1.');
        return;
      }

      products.push({
        id: products.length + 1,
        name: name,
        category: category,
        price: price,
        quantity: quantity
      });

      if (tang_dan !== null) {
        products.sort((a, b) => {
          const nameA = a.name.toLowerCase();
          const nameB = b.name.toLowerCase();
          if (nameA < nameB) return tang_dan ? -1 : 1;
          if (nameA > nameB) return tang_dan ? 1 : -1;
          return 0;
        });
      }

      renderTable();

      nameInput.value = '';
      categoryInput.value = '';
      priceInput.value = '';
      quantityInput.value = '';
    });

    window.addEventListener('DOMContentLoaded', loadProducts);

  </script>
</body>
</html>
