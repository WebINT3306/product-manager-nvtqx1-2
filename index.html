<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e6f2ff;
        }

        .form {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h2>Quản lý sản phẩm</h2>

<table id="product-table">
    <thead>
    <tr>
        <th>STT</th>
        <th id="sort-name">Tên sản phẩm ▲▼</th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="form">
    <h3>Thêm sản phẩm</h3>
    <input id="input-name" placeholder="Tên sản phẩm">
    <input id="input-category" placeholder="Danh mục">
    <input id="input-price" type="number" placeholder="Đơn giá">
    <input id="input-quantity" type="number" placeholder="Số lượng">
    <button id="btn-add">Thêm</button>
</div>

<script>
    let productList = [];
    let sortAsc = true;
    const tbody = document.querySelector("#product-table tbody");

    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            productList = JSON.parse(xhr.responseText);
            renderTable(productList);
        }
    };
    xhr.open('GET', 'products.json');
    xhr.send();

    function renderTable(data) {
        tbody.innerHTML = "";
        data.forEach((p, index) => {
            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${p.name}</td>
                    <td>${p.category || ""}</td>
                    <td>${p.price}</td>
                    <td>${p.quantity}</td>
                </tr>`;
            tbody.innerHTML += row;
        });
    }

    document.getElementById("sort-name").addEventListener("click", () => {
        productList.sort((a, b) => {
            if (sortAsc) {
                return a.name.localeCompare(b.name);
            } else {
                return b.name.localeCompare(a.name);
            }
        });

        document.getElementById("sort-name").textContent = "Tên sản phẩm " + (sortAsc ? "▲" : "▼");

        sortAsc = !sortAsc;
        renderTable(productList);
    });

    document.getElementById("btn-add").addEventListener("click", () => {
        const name = document.getElementById("input-name").value.trim();
        const category = document.getElementById("input-category").value.trim();
        const price = parseFloat(document.getElementById("input-price").value);
        const quantity = parseInt(document.getElementById("input-quantity").value);

        if (name.length < 3 || isNaN(price) || price <= 0 || isNaN(quantity) || quantity < 1) {
            alert("Vui lòng nhập đúng định dạng dữ liệu!");
            return;
        }

        const newProduct = {
            id: Date.now(),
            name: name,
            category: category,
            price: price,
            quantity: quantity
        };

        productList.push(newProduct);
        renderTable(productList);

        document.getElementById("input-name").value = "";
        document.getElementById("input-category").value = "";
        document.getElementById("input-price").value = "";
        document.getElementById("input-quantity").value = "";
    });
</script>
</body>

</html>
